<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
font-family:sans-serif;
color:#fff;
overflow:hidden;
}

/* ===== シーン ===== */
.scene{
position:relative;
height:100vh;
}

/* 背景 */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* キャラ */
.char{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
height:75%;
}

/* ===== ステータス（左上） ===== */
.status{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
font-size:12px;
line-height:1.4;
}

/* スタミナバー */
.bar{
height:10px;
background:#333;
border-radius:5px;
overflow:hidden;
margin-top:3px;
}
.bar-inner{
height:100%;
background:linear-gradient(90deg,#ff5,#0f0);
}

/* ===== メッセージ ===== */
.msg{
position:absolute;
bottom:90px;
left:10px;
right:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
min-height:40px;
font-size:13px;
}

/* ===== ボタンエリア ===== */
.menu{
position:absolute;
bottom:0;
width:100%;
display:flex;
background:#111;
}

.menu button{
flex:1;
padding:15px;
border:none;
color:#fff;
font-size:14px;
background:linear-gradient(#333,#111);
}

.menu button:active{
background:#555;
}

/* アクションボタン */
.action-panel{
position:absolute;
bottom:60px;
width:100%;
display:flex;
flex-wrap:wrap;
background:#111;
}

.action-panel button{
width:50%;
padding:12px;
border:1px solid #222;
background:linear-gradient(#444,#111);
color:#fff;
}
</style>
</head>

<body>

<div class="scene">

<img class="bg" id="bg">
<img class="char" id="char">

<div class="status" id="status"></div>

<div class="msg" id="msg"></div>

<div class="action-panel" id="actions"></div>

<div class="menu">
<button onclick="setMenu('main')">メイン</button>
<button onclick="setMenu('action')">行動</button>
<button onclick="setMenu('shop')">買い物</button>
</div>

</div>

<script>

let state;

// =====================
function newGame(){
state={
week:1,
year:20,
money:300000,
st:100,
maxSt:100,
charm:10,
trust:50,
influence:0,
housing:"home",
boyfriend:"none",
fans:0,
msg:"ゲーム開始",

stream:0,
sns:0,
gym:0,
papa:0,

char:"normal"
};

render();
}

// =====================
function formatMoney(n){
if(n>=100000000){
return Math.floor(n/100000000)+"億"+Math.floor((n%100000000)/10000)+"万";
}
if(n>=10000){
return Math.floor(n/10000)+"万"+Math.floor((n%10000)/1000)+"千";
}
return n;
}

// =====================
function render(){

// キャラ
let charMap={
normal:"char_normal.png",
success:"char_success.png",
good:"char_good.png",
fail:"char_fail.png"
};

document.getElementById("char").src=charMap[state.char];
document.getElementById("bg").src="bg_home.png";

// ステータス
document.getElementById("status").innerHTML=`
${state.year}歳 ${state.week}週<br>
¥${formatMoney(state.money)}<br>

スタミナ
<div class="bar"><div class="bar-inner" style="width:${state.st/state.maxSt*100}%"></div></div>
${state.st}/${state.maxSt}<br>

魅力:${state.charm} 信用:${state.trust} 影響力:${state.influence}<br>
住居:実家 彼氏:${state.boyfriend} 太客:0人
`;

// メッセージ
document.getElementById("msg").innerText=state.msg;

}

// =====================
function setMenu(type){

let el=document.getElementById("actions");

if(type==="main"){
el.innerHTML="";
return;
}

if(type==="action"){
el.innerHTML=`
<button onclick="stream()">配信</button>
<button onclick="sns()">SNS</button>
<button onclick="gym()">ジム</button>
<button onclick="papa()">パパ活</button>
`;
}

if(type==="shop"){
el.innerHTML=`
<button onclick="buy(2000,1)">化粧品</button>
<button onclick="buy(10000,3)">高級化粧品</button>
<button onclick="buy(8000,3)">エステ</button>
`;
}

}

// =====================
function stream(){
state.money+=5000;
state.msg="配信で稼いだ";
state.char="success";
render();
}

function sns(){
state.influence+=2;
state.msg="SNS更新した";
state.char="good";
render();
}

function gym(){
state.charm+=1;
state.msg="ジムで鍛えた";
state.char="good";
render();
}

function papa(){
state.money+=10000;
state.msg="パパ活成功";
state.char="success";
render();
}

function buy(c,v){
state.money-=c;
state.charm+=v;
state.msg="買い物した";
state.char="good";
render();
}

// =====================
newGame();

</script>

</body>
</html>
