<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body{
height:100%;
overflow:hidden; /* ←スクロール完全禁止 */
touch-action:none; /* ←スワイプ無効化 */
}

/* iOS対策 */
body{
position:fixed;
width:100%;
}
body{
margin:0;
background:#000;
color:#fff;
font-family:sans-serif;
}

.scene{
position:fixed; /* ← absoluteじゃなくfixed */
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
}
  /* =====フェード処理 ===== */
#fade{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
opacity:0;
pointer-events:none;
z-index:999; /* 最前面 */
transition:opacity 0.25s ease;
}
  
/* ===== 背景 ===== */
.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* ===== 彼氏 ===== */
.bf{
position:absolute;
bottom:25vh;
left:85%;
transform:translateX(-50%);
height:50%;
z-index:1;
pointer-events:none; /* ←クリックを通す */
}

/* ===== 主人公 ===== */
.char{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
height:75%;
z-index:2;
pointer-events:none; /* ←これが一番重要 */
}

/* ===== 左上 ===== */
.status{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.6);
padding:8px;
border-radius:8px;
font-size:12px;
z-index:10;
}

/* ===== 右上 ===== */
.stbox{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.6);
padding:6px;
border-radius:8px;
font-size:12px;
width:140px;
z-index:10;
}

/* ===== スタミナバー ===== */
.bar{
height:8px;
background:#333;
border-radius:4px;
margin-top:3px;
}
.bar-inner{
height:100%;
background:#0f0;
}

/* ===== メッセージ ===== */
.msg{
position:absolute;
top:90px;
left:10px;
right:10px;
background:rgba(0,0,0,0.6);
padding:8px;
border-radius:8px;
min-height:40px;
z-index:10;
}

/* ===== ボタン ===== */
.menu{
position:absolute;
bottom:35px;
left:10px;
right:10px;
z-index:20; /* ←最前面 */
}

.main-btn{
width:100%;
padding:14px;
margin:6px 0;
border-radius:10px;
background:rgba(0,0,0,0.6);
color:#fff;
border:none;
}

.sub-btn{
width:100%;
padding:10px;
margin:4px 0;
border-radius:12px;
background:rgba(50,50,50,0.7);
color:#fff;
border:none;
}

/* 押せない状態 */
button:disabled{
opacity:0.4;
}
</style>
</head>

<body>

<div class="scene">
<img class="bg" src="bg_home.png">
<img class="char" id="char">
<img class="bf" id="bf" style="display:none;">
<div class="status" id="status"></div>
<div class="stbox" id="stbox"></div>
<div class="msg" id="msg"></div>
<div class="menu" id="menu"></div>
<!-- ★これを追加 -->
<div id="fade"></div>
</div>

<script>
// ===== 画面スライド禁止 =====
document.addEventListener('touchmove', function(e){
e.preventDefault();
}, { passive:false });
  
let bgm = null;
let currentBgm = "";

// ====BGM====
function getBgmByHouse(){

let house = getHouseName();

if(house === "実家") return "bgm1.mp3";
if(house === "マンション") return "bgm2.mp3";
if(house === "タワマン") return "bgm3.mp3";
if(house === "豪邸") return "bgm3.mp3";

return "bgm1.mp3";
}
  function playBGM(){

let next = getBgmByHouse();

// 同じ曲なら何もしない
if(currentBgm === next) return;

// 既存停止
if(bgm){
bgm.pause();
bgm.currentTime = 0;
}

// 新規再生
bgm = new Audio(next);
bgm.loop = true;
bgm.volume = 0.5;

// ★スマホ対策（ユーザー操作後に再生）
bgm.play().catch(()=>{});

currentBgm = next;
}
// ===== 効果音 =====
function playRandom(arr){
new Audio(arr[Math.floor(Math.random()*arr.length)]).play();
}
function play(name){ new Audio(name).play(); }

function playVoice(type){

if(type==="normal"){
new Audio("normal5.mp3").play();
return;
}

if(type==="good"){
playRandom(["good1.mp3","good2.mp3","good3.mp3"]);
return;
}

if(type==="success"){
playRandom(["success1.mp3","success2.mp3","success3.mp3","success4.mp3"]);
return;
}

if(type==="fail"){
playRandom(["fail1.mp3","fail2.mp3"]);
}
}
// ===== state =====
let state,mode="home";
function showTitle(){

let hasSave = localStorage.getItem("saveData");

document.getElementById("menu").innerHTML=`
<button class="main-btn" onclick="startNew()">はじめから</button>
<button class="main-btn" onclick="continueGame()" ${!hasSave?'disabled':''}>つづきから</button>
`;

document.getElementById("status").innerHTML="";
document.getElementById("msg").innerHTML="";
}
function startNew(){
tap();
newGame();
playBGM();
}
function getMorningMsg(){

let list = [
"おはよう！今日は何をする？",
"ふぁ～よく寝た。さぁ今日はどうしよっかな～！",
"おはよう～！今日はいい天気だねー。今日は何しよっか。"
];

return list[Math.floor(Math.random()*list.length)];
}

function continueGame(){
tap();
if(loadGame()){
render();
playBGM();
}else{
alert("セーブデータがありません");
}
}
  
function newGame(){
state={
day:1,
money:100000,
st:100,
maxSt:100,

trust:0,
followers:0,

boyfriend:"none",

gym:0,gymMiss:0,
cosme:0,cosmeDay:0,
esthe:0,estheDay:0,
cloth:0,clothDay:0,
acc:0,accDay:0,
bag:0,bagDay:0,
esthePoint:0,
estheMiss:0,
msg1: getMorningMsg(), // ←ここ変更
msg2:"",
char:"normal"
};

render();
}
function getHouseName(){
return "実家"; // 今は固定（後で拡張）
}
// ===== 魅力 =====
function getCharm(){
let c =
state.gym +
state.esthePoint +  // ←追加
(state.cosme*10)+
(state.esthe*10)+
(state.cloth*10)+
(state.acc*10)+
(state.bag*10);

return Math.min(100,c);
}

// ===== 表示 =====
function render(){

// ===== 主人公キャラ =====
document.getElementById("char").src = "char_" + state.char + ".png";


// ===== 彼氏表示 =====
let bf = document.getElementById("bf");

if(state.boyfriend === "none"){
bf.style.display = "none";
}else{
bf.style.display = "block";

if(state.boyfriend === "normal"){
bf.src = "kareshi1.png";
}
if(state.boyfriend === "rich"){
bf.src = "kareshi2.png";
}
if(state.boyfriend === "vip"){
bf.src = "kareshi3.png";
}
}


// ===== 左上ステータス =====
document.getElementById("status").innerHTML=`
20歳${state.day}日目（${getHouseName()}）<br>
所持金 ${Math.floor(state.money)}円<br>
魅力:${getCharm()} 信用:${state.trust} フォロワー:${state.followers}
`;


// ===== 右上 =====
document.getElementById("stbox").innerHTML=`
ST ${state.st}/${state.maxSt}
<div class="bar">
<div class="bar-inner" style="width:${state.st/state.maxSt*100}%"></div>
</div>
彼氏:${getBoyName()} / 太客0人
`;


// ===== メッセージ =====
document.getElementById("msg").innerHTML=
state.msg1 + "<br>" + state.msg2;


// ===== ボタン描画 =====
renderMenu();
// ==== BGM ==== 
playBGM();
}

function getBoyName(){
return{
none:"なし",
normal:"通常",
rich:"小金持ち",
vip:"大金持ち"
}[state.boyfriend];
}

// ===== メニュー =====
function renderMenu(){
let m=document.getElementById("menu");

if(mode==="home"){
m.innerHTML=`
<button class="main-btn" onclick="tap();mode='action';render()">アクション</button>
<button class="main-btn" onclick="tap();mode='shop';render()">買い物（所持品）</button>
`;
return;
}

if(mode==="action"){
m.innerHTML=`
<button class="sub-btn" onclick="doSNS()">SNSを投稿する（ST10消費）</button>
<button class="sub-btn" onclick="doGym()">ジムへ行く（ST20消費$3000円支払い）</button>
<button class="sub-btn" onclick="doEsthe()">エステに行く（ST30消費&5000円支払い）</button>
<button class="sub-btn" onclick="doStream()">Youtubeで配信をする（ST50消費）</button>
<button class="sub-btn" onclick="doPapa()">パパ活に出かける（ST100消費）</button>
<button class="sub-btn" onclick="sleep()">今日はもう寝る（ST80回復）</button>

<div style="display:flex; gap:6px;">
<button class="sub-btn" style="flex:7;" onclick="mode='home';render()">戻る</button>
<button class="sub-btn" style="flex:3;" onclick="saveGameCustom()">セーブ</button>
</div>
`;
return;
}

if(mode==="shop"){
m.innerHTML=`
<button class="sub-btn" ${state.cosme?'disabled':''} onclick="buyCosme()">化粧品（${state.cosme?`残り${state.cosmeDay}日`:'1万円'}）</button>
<button class="sub-btn" onclick="buyEsthe()">
エステ機器（${state.estheDay>0?`残り${state.estheDay}日`:'5万円'}）
</button>

<button class="sub-btn" onclick="buyCloth()">
勝負服一式（${state.clothDay>0?`残り${state.clothDay}日`:'10万円'}）
</button>

<button class="sub-btn" onclick="buyAcc()">
高級ジュエリー（${state.accDay>0?`残り${state.accDay}日`:'20万円'}）
</button>

<button class="sub-btn" onclick="buyBag()">
ブランドバッグ（${state.bagDay>0?`残り${state.bagDay}日`:'30万円'}）
</button>
<button class="sub-btn" onclick="mode='home';render()">戻る</button>
`;
}
}
// ===== セーブ音つき関数　====
function saveGameCustom(){
tap();

saveGame();

new Audio("save.mp3").play();

state.msg1="セーブしました！";
state.msg2="いつでも続きから遊べます";

render();
}
// ===== 共通 =====
function tap(){new Audio("tap1.mp3").play();}

function useSt(n){
if(state.st<n){
state.msg1="スタミナが足りない！";
state.msg2="今日はもう寝よう。。。";
state.char="fail";
render();
return false;
}
state.st-=n;
return true;
}

  
// =====お金の管理 =====
function pay(cost){
if(state.money < cost){
state.msg1 = "お金が足りない...";
state.msg2 = "どうにかして稼がないと";
state.char = "fail";
playVoice("fail");
render();
return false;
}
state.money -= cost;
return true;
}
// ===== 行動 =====
function doSNS(){
tap();
if(!useSt(10)) return;

let f = 5 + Math.floor(Math.random()*10);
state.followers += f;

state.msg1 = "SNSを投稿した！";
state.msg2 = `フォロワーが${f}人増えた！`;
state.char = "good";

playVoice("good");
render();
}
function doEsthe(){
tap();
if(!useSt(30)) return;
if(!pay(5000)) return;

// ★ここが本体
if(state.esthePoint < 15) state.esthePoint++;
state.estheMiss = 0;

state.msg1 = "エステサロンに行った！";
state.msg2 = "魅力が1上がった！";
state.char = "good";

playVoice("good");
render();
}

function doStream(){
tap();
if(!useSt(50)) return;

let m = 5000 + Math.random()*5000;
let f = 10 + Math.floor(Math.random()*20);

state.money += Math.floor(m);
state.followers += f;

state.msg1 = "Youtubeで配信をした！";
state.msg2 = `${Math.floor(m)}円の投げ銭！ フォロワー+${f}`;
state.char = "success";

playVoice("success");
render();
}
function doGym(){
tap();
if(!useSt(20)) return;
if(!pay(3000)) return;

// 魅力加算（上限15）
if(state.gym < 15) state.gym++;

// サボりリセット
state.gymMiss = 0;

state.msg1 = "ジムへ行った！";
state.msg2 = "魅力が1上がった！";
state.char = "good";

playVoice("good");
render();
}
function doPapa(){
tap();
if(!useSt(100)) return;

let r = Math.random();

if(r < 0.1){
state.msg1="失敗。。。1円ももらえなかった。";
state.msg2="骨折り損だわ。。。";
state.char="fail";
playVoice("fail");
render();
return;
}

if(r < 0.2){
state.msg1="最悪。待ち合わせすっぽかされた。";
state.msg2="もう今日は何もやる気でない";
state.char="fail";
playVoice("fail");
render();
return;
}

let base = 10000 + Math.random()*10000;
let bonus = getCharm()*1000;

let total = Math.floor(base + bonus);

state.money += total;

state.msg1="パパ活成功！";
state.msg2=`${total}円もらった！`;
state.char="success";

playVoice("success");
render();
}

// ===== 就寝 =====
function sleep(){
tap();
new Audio("sleep.mp3").play();

fadeTransition(()=>{

// ST回復
state.st = Math.min(state.maxSt, state.st + 80);

// 日付進行
state.day++;

// 減衰
decay();

// 彼氏お小遣い
boyfriendBonus();

// ST上限再計算
state.maxSt = 100;
if(state.boyfriend === "normal"){
state.maxSt += 20;
}

// 彼氏イベント
boyfriendEvent();

// 朝メッセージ
if(state.msg1 === "" || state.char === "normal"){
state.msg1 = getMorningMsg();
state.msg2 = "";
state.char = "normal";
playVoice("normal");
}

render();

});
}
// ===== 劣化 =====
function decay(){

// 化粧品
if(state.cosmeDay>0 && --state.cosmeDay===0){
state.cosme=0;
state.msg1="化粧品がなくなった...";
state.msg2="早急に補充しなくちゃ！";
playVoice("fail");
}

// エステ機器
if(state.estheDay>0 && --state.estheDay===0){
state.esthe=0;
state.msg1="エステ機器が故障した...";
state.msg2="壊れるの早すぎだよ～。";
playVoice("fail");
}

// 服
if(state.clothDay>0 && --state.clothDay===0){
state.cloth=0;
state.msg1="勝負服が経年劣化した...";
state.msg2="やばい！これじゃいざという時に困る！";
playVoice("fail");
}

// アクセ
if(state.accDay>0 && --state.accDay===0){
state.acc=0;
state.msg1="高級ジュエリーを紛失した...";
state.msg2="最悪。また買わなくちゃ！";
playVoice("fail");
}

// バッグ
if(state.bagDay>0 && --state.bagDay===0){
state.bag=0;
state.msg1="ブランドバッグが経年劣化した...";
state.msg2="破けちゃった。使い方が悪いのかなぁ。";
playVoice("fail");
}

// ジム
state.gymMiss++;
if(state.gymMiss>=7 && state.gym>0){
state.gym--;
state.msg1="ジムを7日連続でさぼったため魅力が1減少した。";
playVoice("fail");
}

// エステ減衰
state.estheMiss++;
if(state.estheMiss >= 14 && state.esthePoint > 0){
state.esthePoint--;
state.msg1 = "14日連続でエステに行かなかったため魅力1が下がった...";
playVoice("fail");
}
}

// ===== 彼氏 =====
function boyfriendBonus(){

if(state.boyfriend === "none") return;

let r = Math.random();
let money = 0;

// 通常彼氏
if(state.boyfriend === "normal"){
if(r < 0.1) money = 10000;
}

// 小金持ち
if(state.boyfriend === "rich"){
if(r < 0.2) money = 10000;
else if(r < 0.35) money = 20000;
else if(r < 0.45) money = 30000;
}

// 大金持ち
if(state.boyfriend === "vip"){
if(r < 0.2) money = 100000;
else if(r < 0.35) money = 200000;
else if(r < 0.45) money = 300000;
}

// お金もらえた場合
if(money > 0){
state.money += money;

state.msg1 = "ラッキー♪";
state.msg2 = `彼氏が${Math.floor(money/10000)}万円のおこづかいをくれた！`;

state.char = "success";

// ★1秒後に再生（sleep音と被らない）
setTimeout(()=>{
new Audio("money.mp3").play();
}, 1000);

playVoice("success");
}
}
// ===== 買い物 =====
function buyCosme(){
tap();
if(state.cosme >= 1) return;
if(!pay(10000)) return;

state.cosme = 1;
state.cosmeDay = 7;

state.msg1="化粧品を購入した！";
state.msg2="魅力+10";
state.char="good";
// ★変更
new Audio("money.mp3").play();

render();
}
function buyEsthe(){
tap();
if(state.esthe >= 1) return;
if(!pay(50000)) return;

state.esthe = 1;
state.estheDay = 35;

state.msg1="エステ機器を購入した！";
state.msg2="魅力+10";
state.char="good";
// ★変更
new Audio("money.mp3").play();

render();
}

function buyCloth(){
tap();
if(state.cloth >= 1) return;
if(!pay(100000)) return;

state.cloth = 1;
state.clothDay = 70;

state.msg1="勝負服一式を購入した！";
state.msg2="魅力+10";
state.char="good";
// ★変更
new Audio("money.mp3").play();

render();
}

function buyAcc(){
tap();
if(state.acc >= 1) return;
if(!pay(200000)) return;

state.acc = 1;
state.accDay = 70;

state.msg1="高級アクセサリーを購入した！";
state.msg2="魅力+10";
state.char="good";
// ★変更
new Audio("money.mp3").play();

render();
}

function buyBag(){
tap();
if(state.bag >= 1) return;
if(!pay(300000)) return;

state.bag = 1;
state.bagDay = 70;

state.msg1="ブランドバッグを購入した！";
state.msg2="魅力+10";
state.char="good";
  
// ★変更
new Audio("money.mp3").play();

render();
}
function boyfriendBonus(){

if(state.boyfriend === "none") return;

let r = Math.random();
let money = 0;

// 通常彼氏
if(state.boyfriend === "normal"){
if(r < 0.1) money = 10000;
}

// 小金持ち
if(state.boyfriend === "rich"){
if(r < 0.2) money = 10000;
else if(r < 0.35) money = 20000;
else if(r < 0.45) money = 30000;
}

// 大金持ち
if(state.boyfriend === "vip"){
if(r < 0.2) money = 100000;
else if(r < 0.35) money = 200000;
else if(r < 0.45) money = 300000;
}

// お金もらえた場合
if(money > 0){
state.money += money;

state.msg1 = "ラッキー♪";
state.msg2 = `彼氏が${Math.floor(money/10000)}万円のおこづかいをくれた！`;

state.char = "success";
playVoice("success");
}
}
// ==== お金が足りない時のメッセージ =====
function failMoney(){
state.msg1="お金が足りない";
state.msg2="なんとかしてお金をGETしなければ！";
state.char="fail";
render();
}

// ==== トランジション設定 =====
function fadeTransition(callback){

let f = document.getElementById("fade");

// 暗転（2秒）
f.style.transition = "opacity 2s ease";
f.style.opacity = 1;

setTimeout(()=>{

try{
callback();
}catch(e){
console.error(e);
}

// ★ここが重要（必ず戻す）
setTimeout(()=>{
f.style.transition = "opacity 0.1s linear";
f.style.opacity = 0;
}, 50);

}, 2000);
}

// ==== セーブ =====
function saveGame(){
localStorage.setItem("saveData", JSON.stringify(state));
}
  
// ==== ロード =====
function loadGame(){
let data = localStorage.getItem("saveData");
if(!data) return false;
state = JSON.parse(data);
return true;
}
  
// ==== タイトル画面へ遷移 =====
function saveAndExit(){
tap();
saveGame();

state.msg1="セーブしました";
state.msg2="タイトルに戻ります";

render();

setTimeout(()=>{
showTitle();
},2500);
}
  
window.onload = function(){
showTitle();
};

</script>
</body>
</html>
