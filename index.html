<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>絶対に働きたくないニート女子の金稼ぎゲーム</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#000;
  color:#fff;
}

.container{
  max-width:480px;
  margin:auto;
}
.scene{
  height:60vh;
  min-height:300px;
}
.bg{
  width:100%;
  height:100%;
  object-fit:cover;
}

.char{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  height:90%;
  pointer-events:none;
}

.ui{
  padding:10px;
  background:#111;
}

button{
  width:100%;
  padding:12px;
  margin:5px 0;
  font-size:16px;
}

.disabled{
  opacity:0.4;
}

.box{
  border:1px solid #444;
  padding:6px;
  margin-bottom:5px;
  font-size:14px;
}
</style>

</head>
<body>
<div style="color:white">表示テスト</div>
<div id="app" class="container"></div>

<script>

let state;

const BG = {
  home:"bg_home.png",
  normal:"bg_normal.png",
  luxury:"bg_luxury.png",
  mansion:"bg_mansion.png"
};

function newGame(){
state = {
week:1,
year:1,
money:300000,
st:100,
maxSt:100,
charm:10,
trust:50,
influence:0,
housing:"home",
gymMiss:0,
snsUsed:false,
gymUsed:false,
inventory:[],
gifts:0,
charState:"normal"
};
save();
render();
}

function save(){
localStorage.setItem("save",JSON.stringify(state));
}

function load(){
let s = localStorage.getItem("save");

if(!s){
  alert("セーブデータがありません");
  return;
}

try{
  state = JSON.parse(s);
}catch(e){
  alert("セーブデータ破損");
  localStorage.removeItem("save");
  return;
}

render();
}

function render(){
if(!state){
  console.log("state未初期化");
  return;
}
let app = document.getElementById("app");

app.innerHTML = `
<div class="scene">
  <img class="bg" src="${BG[state.housing]}">
  <img class="char" src="char_${state.charState}.png">
</div>

<div class="ui">

<div class="box">
週：${state.year}年 ${state.week}週<br>
所持金：¥${state.money}<br>
ST：${state.st}/${state.maxSt}<br>
魅力：${state.charm} 信用：${state.trust} 影響力：${state.influence}<br>
住居：${getHouseName()}
</div>

<button onclick="actions()">行動する</button>
<button onclick="housing()">住居変更</button>
<button onclick="rest()">休む</button>

</div>
`;
}

function getHouseName(){
return {
home:"実家",
normal:"普通",
luxury:"高級",
mansion:"豪邸"
}[state.housing];
}

function applyHousingEffect(type){
if(type==="normal") state.charm+=5;
if(type==="luxury"){ state.charm+=15; }
if(type==="mansion"){ state.charm+=30; state.maxSt+=20; }
}

function housing(){
document.getElementById("app").innerHTML = `
<h3>住居変更（引っ越し費用 ¥100,000）</h3>

<button onclick="move('home')">実家</button>
<button onclick="move('normal')">普通マンション</button>
<button onclick="move('luxury')">高級マンション</button>
<button onclick="move('mansion')">豪邸</button>

<button onclick="render()">戻る</button>
`;
}

function move(type){

if(state.money < 100000){
alert("引っ越し費用が足りない");
return;
}

state.money -= 100000;
state.housing = type;
applyHousingEffect(type);

render();
save();
}

function actions(){
document.getElementById("app").innerHTML = `
<button onclick="stream()">配信</button>
<button onclick="sns()" ${state.snsUsed?'class="disabled"':''}>SNS</button>
<button onclick="gym()" ${state.gymUsed?'class="disabled"':''}>ジム</button>
<button onclick="render()">戻る</button>
`;
}

function consumeSt(n){
if(state.st<n){
if(!confirm("ST不足。実行？")) return false;
if(Math.random()<0.5){
state.charState="fail";
next();
return false;
}
}
state.st-=n;
return true;
}

function stream(){
if(!consumeSt(20)) return;

let gain = Math.floor(state.charm*5*Math.random());
state.money += gain;
state.influence += 1;

// ▼ここ修正
if(gain > 0){
  state.charState = "success";
}else{
  state.charState = "good";
}

next();
}

function sns(){
if(state.snsUsed) return;
if(!consumeSt(5)) return;

let gain = 100;
state.money += gain;
state.influence += 2;
state.snsUsed = true;

// ▼必ずお金増えるのでsuccess
state.charState = "success";

next();
}

function gym(){
if(state.gymUsed) return;
if(state.money < 3000){alert("金不足"); return;}
if(!consumeSt(5)) return;

state.money -= 3000;
state.charm += 1;
state.gymUsed = true;
state.gymMiss = 0;

if(Math.random()<0.1 && state.maxSt<150){
  state.maxSt++;
}

// ▼非金銭成功
state.charState = "good";

next();
}

function rest(){
state.st = Math.min(state.maxSt, state.st + 40);

// ▼非金銭成功
state.charState = "good";

next();
}

function next(){

state.week++;
if(state.week>4){
state.week=1;
state.year++;
}

state.snsUsed=false;
state.gymUsed=false;

if(!state.gymUsed) state.gymMiss++;
if(state.gymMiss>=4 && state.maxSt>100){
state.maxSt--;
}

if(state.trust<=-100){
alert("信用崩壊 GAME OVER");
localStorage.removeItem("save");
location.reload();
}

if(state.money<-1000000){
alert("破産 GAME OVER");
localStorage.removeItem("save");
location.reload();
}

save();
render();
}

function start(){
let has = localStorage.getItem("save");

document.getElementById("app").innerHTML = `
<h2>絶対に働きたくない女の金稼ぎゲーム</h2>
<button onclick="newGame()">はじめから</button>
<button onclick="load()" ${!has?'class="disabled"':''}>つづきから</button>
`;
}

start();

</script>

</body>
</html>
