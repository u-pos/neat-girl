<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>絶対に働きたくない女の金稼ぎゲーム</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}
.container{max-width:480px;margin:auto;}
.scene{position:relative;height:60vh;min-height:300px;}
.bg{width:100%;height:100%;object-fit:cover;}
.char{
 position:absolute;
 bottom:0;
 left:50%;
 transform:translateX(-50%);
 height:90%;
}
.ui{padding:10px;background:#111;}
button{width:100%;padding:12px;margin:5px 0;font-size:16px;}
.box{border:1px solid #444;padding:6px;margin-bottom:5px;font-size:14px;}
</style>
</head>

<body>
<div id="app" class="container"></div>

<script>

let state;

const BG = {
home:"bg_home.png",
normal:"bg_normal.png",
luxury:"bg_luxury.png",
mansion:"bg_mansion.png"
};

// =========================
// 初期化
// =========================
function newGame(){
state = {
week:1,
year:1,
money:300000,

st:100,
maxSt:100,

charm:10,
trust:50,
influence:0,

housing:"home",

// 行動回数
streamCount:0,
snsCount:0,
gymCount:0,
papaCount:0,

// 彼氏
hasBoyfriend:false,

charState:"normal"
};

save();
render();
}

// =========================
// セーブ
// =========================
function save(){
localStorage.setItem("save",JSON.stringify(state));
}

function load(){
let s = localStorage.getItem("save");
if(!s){alert("セーブなし");return;}
state = JSON.parse(s);
render();
}

// =========================
// 描画
// =========================
function render(){

if(!state) return;

let charImg = "char_normal.png";
if(state.charState==="success") charImg="char_success.png";
if(state.charState==="good") charImg="char_good.png";
if(state.charState==="fail") charImg="char_fail.png";

let app = document.getElementById("app");

app.innerHTML = `
<div class="scene">
<img class="bg" src="${BG[state.housing]}">
<img class="char" src="${charImg}">
</div>

<div class="ui">

<div class="box">
${state.year}年 ${state.week}週<br>
¥${state.money}<br>
ST ${state.st}/${state.maxSt}<br>
魅力 ${state.charm} 信用 ${state.trust}<br>
住居 ${getHouseName()}<br>
彼氏 ${state.hasBoyfriend ? "あり" : "なし"}
</div>

<button onclick="actions()">行動</button>
<button onclick="shopping()">買い物</button>
<button onclick="housing()">住居変更</button>

</div>
`;
}

// =========================
// 住居
// =========================
function getHouseName(){
return {
home:"実家",
normal:"普通",
luxury:"高級",
mansion:"豪邸"
}[state.housing];
}

function housing(){
document.getElementById("app").innerHTML = `
<h3>引っ越し（10万円）</h3>
<button onclick="move('home')">実家</button>
<button onclick="move('normal')">普通</button>
<button onclick="move('luxury')">高級</button>
<button onclick="move('mansion')">豪邸</button>
<button onclick="render()">戻る</button>
`;
}

function move(type){
if(state.money<100000){alert("金不足");return;}
state.money-=100000;
state.housing=type;
render();
save();
}

// =========================
// 行動
// =========================
function actions(){
document.getElementById("app").innerHTML = `
<button onclick="stream()">配信 ${state.streamCount}/3</button>
<button onclick="sns()">SNS ${state.snsCount}/3</button>
<button onclick="gym()">ジム ${state.gymCount}/3</button>
<button onclick="papa()">パパ活 ${state.papaCount}/2</button>
<button onclick="rest()">休む</button>
<button onclick="render()">戻る</button>
`;
}

// =========================
// 共通
// =========================
function consumeSt(n){
if(state.st<n){
if(!confirm("ST不足。実行？")) return false;
if(Math.random()<0.5){
state.charState="fail";
next();
return false;
}
}
state.st-=n;
return true;
}

// =========================
// 各行動
// =========================

function stream(){
if(state.streamCount>=3){alert("今週は不可");return;}
if(!consumeSt(20)) return;

let gain = Math.floor(state.charm*5*Math.random());
state.money += gain;
state.influence++;

state.streamCount++;
state.charState = gain>0 ? "success":"good";
next();
}

function sns(){
if(state.snsCount>=3){alert("今週は不可");return;}
if(!consumeSt(5)) return;

state.money += 100;
state.influence += 2;

state.snsCount++;
state.charState="success";
next();
}

function gym(){
if(state.gymCount>=3){alert("今週は不可");return;}
if(state.money<3000){alert("金不足");return;}
if(!consumeSt(5)) return;

state.money-=3000;
state.charm+=1;

state.gymCount++;
state.charState="good";
next();
}

function papa(){
if(state.papaCount>=2){alert("今週は不可");return;}
if(!consumeSt(15)) return;

let success = Math.random()<0.85;
let caught = Math.random()<0.15;

if(success){
let gain = 5000 + Math.random()*10000;
state.money += Math.floor(gain);
state.charState="success";
}else{
state.charState="fail";
}

if(caught){
state.trust -= 10;
}

state.papaCount++;
next();
}

function rest(){
let heal = 40;

if(state.hasBoyfriend){
heal += 10;
}

state.st = Math.min(state.maxSt, state.st+heal);
state.charState="good";
next();
}

// =========================
// 買い物（簡易）
// =========================
function shopping(){
document.getElementById("app").innerHTML = `
<button onclick="buyCharm(2000,1)">化粧品</button>
<button onclick="buyCharm(10000,3)">高級化粧品</button>
<button onclick="buyCharm(5000,2)">ネイル</button>
<button onclick="buyCharm(8000,3)">エステ</button>
<button onclick="render()">戻る</button>
`;
}

function buyCharm(cost, val){
if(state.money<cost){alert("金不足");return;}
state.money-=cost;
state.charm+=val;
state.charState="good";
next();
}

// =========================
// ターン進行
// =========================
function next(){

state.week++;

if(state.week>4){
state.week=1;
state.year++;

// ▼彼氏効果
if(state.hasBoyfriend){
state.charm += 2;
}

// 回数リセット
state.streamCount=0;
state.snsCount=0;
state.gymCount=0;
state.papaCount=0;
}

if(state.trust<=-100){
alert("信用崩壊 GAME OVER");
localStorage.removeItem("save");
location.reload();
}

if(state.money<-1000000){
alert("破産 GAME OVER");
localStorage.removeItem("save");
location.reload();
}

save();
render();
}

// =========================
// タイトル
// =========================
function start(){
let has = localStorage.getItem("save");

document.getElementById("app").innerHTML = `
<h2>絶対に働きたくない女の金稼ぎゲーム</h2>
<button onclick="newGame()">はじめから</button>
<button onclick="load()" ${!has?'disabled':''}>つづきから</button>
`;
}

start();

</script>
</body>
</html>
